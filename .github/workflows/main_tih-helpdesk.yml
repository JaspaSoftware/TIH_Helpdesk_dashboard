# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - tih-helpdesk

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: npm install, build, and test
        run: |
          npm install
          npm run build --if-present
          npm run test --if-present
      
      - name: Zip artifact for deployment
        run: zip -r release.zip . -x "node_modules/*" "src/*" "public/*" "*.ts" "*.tsx" ".git/*" ".github/*"

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_8D75E47531CC42239616EE89148A37A4 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_E5C5F96985E048DE8858FE0025E4FF4F }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_DD44C46DCAB942D39402078B373882F9 }}

      - name: 'Deploy to Azure Web App via Azure CLI'
        run: |
          RESOURCE_GROUP=$(az webapp list --query "[?name=='tih-helpdesk'].resourceGroup" -o tsv)
          az webapp deployment source config-zip --name tih-helpdesk --resource-group $RESOURCE_GROUP --src release.zip